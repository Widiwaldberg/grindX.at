<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>grindX.at</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="site">

  <!-- Auth Screen -->
  <div id="auth-view" class="auth-view">
    <div class="auth-card">
      <div class="logo">grindX.at 🎓❤️</div>
      <div class="subtitle">intim-im-Team</div>

      <div class="auth-tabs">
        <button type="button" class="auth-tab active" data-tab="login">Login</button>
        <button type="button" class="auth-tab" data-tab="register">Registrieren</button>
      </div>

      <form id="login-form" class="auth-form">
        <input type="text" id="login-name" placeholder="Name" autocomplete="username" required>
        <input type="password" id="login-password" placeholder="Passwort" autocomplete="current-password" required>
        <button type="submit" class="save-btn">Einloggen</button>
        <p class="auth-error" id="login-error" hidden></p>
      </form>

      <form id="register-form" class="auth-form" hidden>
        <label class="photo-upload">
          <input type="file" accept="image/*" id="reg-photo-1" hidden required>
          <span class="photo-preview" id="reg-photo-1-preview">📷 Foto hinzufügen</span>
        </label>

        <input type="text" id="reg-name" placeholder="Name" autocomplete="username" required>
        <input type="number" id="reg-alter" placeholder="Alter" min="14" max="100" required>
        <input type="text" id="reg-department" placeholder="Department" required>

        <label class="photo-upload">
          <input type="file" accept="image/*" id="reg-photo-2" hidden required>
          <span class="photo-preview" id="reg-photo-2-preview">📷 Foto hinzufügen</span>
        </label>

        <input type="number" id="reg-jahre" placeholder="Jahre auf xjam" min="0" max="100" required>

        <label class="photo-upload">
          <input type="file" accept="image/*" id="reg-photo-3" hidden required>
          <span class="photo-preview" id="reg-photo-3-preview">📷 Foto hinzufügen</span>
        </label>

        <input type="password" id="reg-password" placeholder="Passwort (mind. 6 Zeichen)" autocomplete="new-password" minlength="6" required>
        <button type="submit" class="save-btn">Registrieren</button>
        <p class="auth-error" id="register-error" hidden></p>
      </form>
    </div>
  </div>

  <!-- App -->
  <div id="app-view" hidden>
    <header class="app">
      <div class="brand">
        <div class="logo">grindX.at 🎓❤️</div>
        <div class="subtitle">intim-im-Team</div>
      </div>
      <div class="icons">🔔 ⚙️</div>
    </header>

    <main class="screens">

      <!-- Discover Screen -->
      <section id="screen-discover" class="screen active">
        <div class="stack" id="card-stack"></div>
        <div class="empty-state" id="empty-state" hidden>
          <p>🎉 Keine weiteren Profile</p>
          <span>Schau später nochmal vorbei!</span>
        </div>
        <div class="actions">
          <button class="btn-nope" id="btn-nope">✕</button>
          <button class="btn-like" id="btn-like">♥</button>
        </div>
      </section>

      <!-- Matches Screen -->
      <section id="screen-matches" class="screen">
        <h2 class="screen-title">Deine Matches</h2>
        <ul class="match-list" id="match-list"></ul>
        <p class="hint" id="matches-hint">Noch keine Matches – lauf zurück zu "Entdecken" und lik ein paar Leute!</p>
      </section>

      <!-- Chat Screen -->
      <section id="screen-chat" class="screen">
        <div class="chat-header">
          <button id="chat-back" class="chat-back">←</button>
          <span id="chat-name">Chat</span>
          <button id="chat-view-profile" class="chat-view-profile" title="Profil ansehen">👤</button>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <form class="chat-input" id="chat-form">
          <input type="text" id="chat-text" placeholder="Nachricht..." autocomplete="off">
          <button type="submit">➤</button>
        </form>
      </section>

      <!-- Partner Profile Screen -->
      <section id="screen-partner-profile" class="screen">
        <div class="chat-header">
          <button id="partner-profile-back" class="chat-back">←</button>
          <span id="partner-profile-name">Profil</span>
        </div>
        <div class="my-profile">
          <div class="my-photos">
            <img id="partner-photo-1" class="my-photo" alt="Foto 1">
            <img id="partner-photo-2" class="my-photo" alt="Foto 2">
            <img id="partner-photo-3" class="my-photo" alt="Foto 3">
          </div>
          <div class="my-info">
            <b id="partner-name"></b>
            <span id="partner-alter"></span>
            <span id="partner-department"></span>
            <span id="partner-jahre"></span>
          </div>
        </div>
      </section>

      <!-- Profile Screen -->
      <section id="screen-profile" class="screen">
        <h2 class="screen-title">Mein Profil</h2>
        <div class="my-profile">
          <div class="my-photos">
            <img id="profile-photo-1" class="my-photo" alt="Foto 1">
            <img id="profile-photo-2" class="my-photo" alt="Foto 2">
            <img id="profile-photo-3" class="my-photo" alt="Foto 3">
          </div>
          <div class="my-info">
            <b id="profile-name"></b>
            <span id="profile-alter"></span>
            <span id="profile-department"></span>
            <span id="profile-jahre"></span>
          </div>
          <button id="btn-logout" class="save-btn logout-btn">Logout</button>
        </div>
      </section>

    </main>

    <nav class="bottom">
      <button class="item active" data-screen="discover"><span class="ic">🔥</span>Entdecken</button>
      <button class="item" data-screen="matches"><span class="ic">💬</span>Matches</button>
      <button class="item" data-screen="profile"><span class="ic">👤</span>Profil</button>
    </nav>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
